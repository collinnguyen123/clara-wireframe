<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>clara · provider sign in</title>
<style>
:root{
  --sage:#4A6B5B; --sage-dark:#2F473B; --sage-deep:#24382E; --sage-pale:#EAF1ED;
  --terra:#C97257; --terra-deep:#A35540; --terra-pale:#FBF2ED;
  --ink:#1F2421; --grey:#474D48; --muted:#777C76;
  --cream:#F7F5F0; --cream-soft:#F2EFE8; --line:#E5E1D8; --line-strong:#D9D4C8;
  --shadow:0 10px 30px rgba(31,36,33,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--cream)}
a{text-decoration:none;color:inherit}

.auth{display:grid;grid-template-columns:1.05fr .95fr;min-height:100vh}
@media(max-width:880px){.auth{grid-template-columns:1fr}.auth .pane-img{min-height:46vh}}

/* LEFT image pane */
.pane-img{position:relative;overflow:hidden;background:var(--sage-dark)}
.pane-img .slide{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 30%;opacity:0;transition:opacity 1.5s cubic-bezier(.4,0,.2,1)}
.pane-img .slide.on{opacity:1}
.pane-img .veil{position:absolute;inset:0;background:linear-gradient(180deg,rgba(36,56,46,.34) 0%,rgba(36,56,46,.06) 26%,rgba(36,56,46,.42) 62%,rgba(36,56,46,.74) 100%)}
.brandmark{position:absolute;top:34px;left:38px;z-index:3;font-family:Georgia,serif;font-weight:700;font-size:30px;color:#fff;letter-spacing:-.5px}
.brandmark .pill{font-family:-apple-system,sans-serif;font-size:13px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;background:rgba(255,255,255,.16);padding:4px 10px;border-radius:8px;margin-left:8px;vertical-align:middle}
.quote{position:absolute;left:48px;right:44px;top:47%;z-index:3;color:#fff;transition:opacity .7s ease}
.quote .q{font-family:Georgia,serif;font-size:33px;line-height:1.32;font-weight:700;letter-spacing:-.3px;max-width:27ch;text-shadow:0 2px 22px rgba(31,36,33,.6)}
.byline{position:absolute;left:42px;bottom:46px;z-index:3;color:#fff;transition:opacity .7s ease}
.byline .who{font-size:19px;font-weight:800;text-shadow:0 1px 12px rgba(31,36,33,.5)}
.byline .role{font-size:14px;color:#E9F0EB;margin-top:4px;line-height:1.5;text-shadow:0 1px 12px rgba(31,36,33,.5)}
.qnav{position:absolute;right:40px;bottom:44px;z-index:3;display:flex;gap:14px}
.qnav button{width:50px;height:50px;border-radius:50%;border:1.5px solid rgba(255,255,255,.6);background:rgba(255,255,255,.10);color:#fff;font-size:18px;cursor:pointer;transition:all .15s;backdrop-filter:blur(2px)}
.qnav button:hover{background:rgba(255,255,255,.22)}
.qdots{position:absolute;left:42px;bottom:118px;z-index:3;display:flex;gap:8px}
.qdots i{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.45)}
.qdots i.on{background:#fff;width:22px;border-radius:5px}

/* RIGHT form pane */
.pane-form{background:#fff;display:flex;align-items:center;justify-content:center;padding:48px 40px;position:relative}
.form-wrap{width:100%;max-width:392px}
.fh{font-family:Georgia,serif;font-size:33px;font-weight:700;letter-spacing:-.5px;color:var(--ink)}
.fsub{font-size:15.5px;color:var(--muted);margin-top:8px;line-height:1.5}

.tabs{display:flex;gap:6px;background:var(--cream-soft);border:1px solid var(--line);border-radius:12px;padding:5px;margin:24px 0 8px}
.tabs button{flex:1;border:none;background:none;font:inherit;font-size:14.5px;font-weight:700;color:var(--muted);padding:9px 0;border-radius:8px;cursor:pointer;transition:all .15s}
.tabs button.on{background:#fff;color:var(--sage-dark);box-shadow:0 1px 3px rgba(31,36,33,.10)}

.rolelbl{font-size:13.5px;font-weight:700;color:var(--grey);margin:18px 0 8px}
.roles{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.roles button{border:1.5px solid var(--line-strong);background:#fff;font:inherit;font-size:14.5px;font-weight:700;color:var(--grey);padding:11px 0;border-radius:11px;cursor:pointer;transition:all .15s}
.roles button.on{border-color:var(--sage);background:var(--sage-pale);color:var(--sage-dark);box-shadow:0 0 0 2px var(--sage-pale)}
.rolesel{width:100%;border:1px solid var(--line-strong);border-radius:11px;background:var(--cream);font:inherit;font-size:15.5px;color:var(--ink);padding:13px 15px;cursor:pointer;transition:all .15s}
.rolesel:focus{outline:none;border-color:var(--sage);box-shadow:0 0 0 3px var(--sage-pale);background:#fff}

.field{margin-top:18px}
.field label{display:block;font-size:13.5px;font-weight:700;color:var(--grey);margin-bottom:7px}
.field input{width:100%;border:1px solid var(--line-strong);border-radius:11px;background:var(--cream);font:inherit;font-size:15.5px;color:var(--ink);padding:13px 15px;transition:all .15s}
.field input::placeholder{color:#A7ABA3}
.field input:focus{outline:none;border-color:var(--sage);box-shadow:0 0 0 3px var(--sage-pale);background:#fff}

.btn-primary{width:100%;margin-top:24px;background:var(--sage-dark);color:#fff;border:none;font:inherit;font-size:16px;font-weight:700;padding:15px;border-radius:12px;cursor:pointer;transition:all .15s}
.btn-primary:hover{background:var(--sage);box-shadow:0 0 0 3px var(--sage),0 14px 30px rgba(47,71,59,.22);transform:translateY(-1px)}

.divider{display:flex;align-items:center;gap:14px;margin:22px 0 18px;color:var(--muted);font-size:13px;font-weight:700}
.divider:before,.divider:after{content:"";flex:1;height:1px;background:var(--line)}

.sbtn{display:flex;align-items:center;justify-content:center;gap:11px;width:100%;border:1.5px solid var(--line-strong);background:#fff;font:inherit;font-size:15px;font-weight:700;color:var(--ink);padding:12px;border-radius:12px;cursor:pointer;transition:all .15s}
.sbtn:hover{border-color:var(--sage);background:var(--cream)}
.sbtn .ic{width:20px;height:20px;flex-shrink:0;display:block}

.foot-note{text-align:center;font-size:14px;color:var(--muted);margin-top:24px}
.foot-note a{color:var(--sage-dark);font-weight:800;text-decoration:underline}
.legal{text-align:center;font-size:12px;color:#A7ABA3;margin-top:24px;line-height:1.6}
.legal a{text-decoration:underline}
.backhome{position:absolute;top:34px;right:38px;z-index:5;font-size:14px;font-weight:700;color:var(--muted)}
.backhome:hover{color:var(--sage-dark)}
</style>
</head>
<body>
<div class="auth">

  <!-- LEFT: provider portraits + quotes -->
  <div class="pane-img">
    <img class="slide on" src="Clara%20Home%20page/Provider%20Auth/doctor.png" alt="A clara physician">
    <img class="slide" src="Clara%20Home%20page/Provider%20Auth/pharmacist.png" alt="A clara pharmacist">
    <img class="slide" src="Clara%20Home%20page/Provider%20Auth/staff.png" alt="A clara care coordinator">
    <div class="veil"></div>
    <span class="brandmark">clara<span class="pill">For providers</span></span>
    <div class="quote" id="quoteBox"><div class="q" id="qtext"></div></div>
    <div class="byline" id="bylineBox"><div class="who" id="who"></div><div class="role" id="role"></div></div>
    <div class="qdots"><i class="on"></i><i></i><i></i></div>
    <div class="qnav"><button aria-label="Previous" onclick="step(-1)">&larr;</button><button aria-label="Next" onclick="step(1)">&rarr;</button></div>
  </div>

  <!-- RIGHT: form -->
  <div class="pane-form">
    <a class="backhome" href="Clara-Homepage-MOCK-v1.html">&larr; Back to site</a>
    <div class="form-wrap">
      <h1 class="fh" id="title">Sign in to your console</h1>
      <p class="fsub" id="subtitle">Secure access for clara providers and administrators.</p>

      <div class="tabs">
        <button id="tabLogin" class="on" onclick="setMode('login')">Sign in</button>
        <button id="tabSignup" onclick="setMode('signup')">Request access</button>
      </div>

      <div class="field" id="nameField" style="display:none">
        <label>Full name</label>
        <input type="text" placeholder="Dr. Dolores Hart">
      </div>
      <div class="field" id="roleWrap" style="display:none">
        <label>Your role</label>
        <select class="rolesel" id="roleSelect">
          <option value="doctor">Doctor</option>
          <option value="pharmacist">Pharmacist</option>
          <option value="staff">Staff</option>
          <option value="admin">Administrator</option>
        </select>
      </div>
      <div class="field">
        <label>Work email</label>
        <input type="email" id="emailInput" placeholder="you@clara.health">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" placeholder="Enter your password">
      </div>

      <button class="btn-primary" id="primaryBtn" onclick="go()">Sign in</button>

      <div class="divider">or continue with</div>

      <button class="sbtn" onclick="go()"><svg viewBox="0 0 48 48" class="ic"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.4 29.3 35.5 24 35.5c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 12.5 24 12.5c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35 26.7 36 24 36c-5.3 0-9.7-3.4-11.3-8.1l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4.1 5.6l6.2 5.2C40.9 36.3 44 30.7 44 24c0-1.3-.1-2.3-.4-3.5z"/></svg>Continue with your clinic SSO</button>

      <p class="foot-note" id="footNote">Need access? <a href="#" onclick="setMode('signup');return false">Request a provider account</a></p>
      <p class="legal">Access is restricted to authorized clara staff. All activity is logged.<br>Clara Relief Inc. · Ontario, Canada · PHIPA compliant</p>
    </div>
  </div>
</div>

<script>
var slides=document.querySelectorAll('.pane-img .slide');
var dots=document.querySelectorAll('.qdots i');
var quoteBox=document.getElementById('quoteBox'),qtext=document.getElementById('qtext');
var bylineBox=document.getElementById('bylineBox'),whoEl=document.getElementById('who'),roleEl=document.getElementById('role');
var QUOTES=[
  {q:'&ldquo;Every plan we approve is one I would be proud to hand my own family.&rdquo;',who:'Dr. Clara Su, MD',role:'Pain physician'},
  {q:'&ldquo;Behind every prescription is a person determined to feel like themselves again.&rdquo;',who:'Sarah Kessler, PharmD',role:'Clinical pharmacist'},
  {q:'&ldquo;The small things, a returned call, a clear answer, are how we earn a patient&rsquo;s trust.&rdquo;',who:'Marco Reyes',role:'Care coordinator'}
];
var cur=0,timer;
function paint(){qtext.innerHTML=QUOTES[cur].q;whoEl.textContent=QUOTES[cur].who;roleEl.textContent=QUOTES[cur].role;}
function show(i){
  var prev=cur;cur=(i+slides.length)%slides.length;
  slides.forEach(function(s,n){s.style.zIndex=(n===cur)?'2':(n===prev?'1':'0');});
  slides[cur].classList.add('on');
  var p=slides[prev];clearTimeout(p._hide);p._hide=setTimeout(function(){p.classList.remove('on');},1600);
  dots.forEach(function(d,n){d.classList.toggle('on',n===cur);});
  quoteBox.style.opacity=0;bylineBox.style.opacity=0;
  setTimeout(function(){paint();quoteBox.style.opacity=1;bylineBox.style.opacity=1;},650);
}
function step(d){show(cur+d);restart();}
function restart(){clearInterval(timer);timer=setInterval(function(){show(cur+1);},5500);}
paint();restart();

function go(){
  var signup=document.getElementById('tabSignup').classList.contains('on');
  var r;
  if(signup){ r=document.getElementById('roleSelect').value; }
  else { var em=(document.getElementById('emailInput').value||'').toLowerCase(); r = em.indexOf('admin')>-1 ? 'admin' : 'doctor'; }
  location.href = r==='admin' ? 'Clara-Admin-Dashboard-MOCK-v1.html' : 'Clara-Doctor-Dashboard-MOCK-v1.html';
}

function setMode(mode){
  var signup=mode==='signup';
  document.getElementById('title').textContent=signup?'Request provider access':'Sign in to your console';
  document.getElementById('subtitle').textContent=signup?'New providers are reviewed and approved by an administrator.':'Secure access for clara providers and administrators.';
  document.getElementById('primaryBtn').textContent=signup?'Request access':'Sign in';
  document.getElementById('nameField').style.display=signup?'block':'none';
  document.getElementById('roleWrap').style.display=signup?'block':'none';
  document.getElementById('tabSignup').classList.toggle('on',signup);
  document.getElementById('tabLogin').classList.toggle('on',!signup);
  document.getElementById('footNote').innerHTML=signup
    ?'Already have an account? <a href="#" onclick="setMode(\'login\');return false">Sign in</a>'
    :'Need access? <a href="#" onclick="setMode(\'signup\');return false">Request a provider account</a>';
}
</script>
</body>
</html>
